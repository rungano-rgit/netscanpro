version: '3.8'
services:
  web:
    build: .
    ports:
      - '5000:5000'
    environment:
      FLASK_ENV: production
      FLASK_SECRET_KEY: your-strong-secret
      SCANNER_DB: /app/scanner.db
      SCANNER_LOG: /app/audit.log
    volumes:
      - .:/app
    command: gunicorn wsgi:app --bind 0.0.0.0:5000 --workers 3

services:
  - type: web
    name: netscanpro-web
    env: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        value: change-me-to-a-strong-secret
      - key: SCANNER_LOG
        value: audit.log

databases:
  - name: netscanpro-db
    engine: postgres
    version: 15
    plan: starter
    region: oregon
